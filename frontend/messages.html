<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages • CodeAlpha Social</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/messages.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <div class="messages-layout anim-fade-in">
        <!-- Conversations Sidebar -->
        <aside class="conversations-sidebar" id="conversations-sidebar-panel">
            <div class="conversations-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>Messages</span>
                <button id="btn-new-chat" class="btn-new-message" style="background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--gray-600); transition: color var(--transition-fast);" title="New Message">📝</button>
            </div>
            <div class="conversations-list" id="conversations-list-wrapper">
                <!-- Loaded via JS -->
            </div>
        </aside>

        <!-- Chat Dialogue Pane -->
        <main class="chat-pane" id="chat-pane-panel">
            <!-- Empty State by default -->
            <div class="chat-empty-state" id="chat-empty-state-wrapper">
                <div class="chat-empty-icon">✉️</div>
                <div class="chat-empty-title">Your Messages</div>
                <div class="chat-empty-desc">Send private messages and connect with other creators.</div>
            </div>

            <!-- Active Chat Container (hidden by default) -->
            <div id="chat-active-wrapper" style="display: none; height: 100%; flex-direction: column;">
                <!-- Header -->
                <div class="chat-header">
                    <!-- Mobile Back button -->
                    <button id="chat-mobile-back-btn" style="display: none; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray-600); margin-right: 8px; font-weight: bold;">←</button>
                    <img id="chat-recipient-avatar" src="/assets/images/default-avatar.svg" class="chat-header-avatar" alt="Avatar">
                    <div>
                        <div class="chat-header-username" id="chat-recipient-username">username</div>
                        <div class="chat-header-fullname" id="chat-recipient-fullname">fullname</div>
                    </div>
                </div>

                <!-- Messages stream -->
                <div class="chat-messages-container" id="chat-messages-stream">
                    <!-- Message bubbles loaded via JS -->
                </div>

                <!-- Footer sending form -->
                <div class="chat-footer">
                    <form class="chat-input-form" id="chat-message-form">
                        <input type="text" id="chat-message-input" class="chat-input-textarea" placeholder="Message..." autocomplete="off" required>
                        <button type="submit" class="chat-send-btn">➔</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- New Chat Modal (Target Followed Creators) -->
    <div id="new-chat-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header" style="padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-weight: 700; font-size: 1.15rem; margin: 0; color: var(--dark-text);">New Message</h3>
                <button id="close-new-chat-modal" style="background: none; border: none; font-size: 1.6rem; cursor: pointer; line-height: 1; color: var(--gray-500);">&times;</button>
            </div>
            <div class="modal-subheader" style="padding: 10px 20px; font-size: 0.78rem; font-weight: 700; color: var(--gray-500); background-color: var(--gray-50); border-bottom: 1px solid var(--border-color); letter-spacing: 0.5px;">
                SUGGESTED FROM FOLLOWING
            </div>
            <div id="followed-list-container" style="flex-grow: 1; overflow-y: auto; max-height: 350px;">
                <!-- Loaded via JS dynamically -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/messages.js"></script>
</body>
</html>
