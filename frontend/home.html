<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed • CodeAlpha Social</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/feed.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <div class="feed-layout anim-fade-in" style="margin-top: 24px;">
        <!-- Main Feed Section -->
        <main class="feed-main">
            <!-- Stories Section -->
            <div class="stories-card">
                <!-- Current user story stub -->
                <div class="story-item" onclick="triggerStoryUploadClick()">
                    <div class="story-img-container" style="position: relative;">
                        <img id="stories-self-avatar" src="/assets/images/default-avatar.svg" alt="Your Story">
                        <span style="position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; background-color: #0095F6; color: #FFF; border-radius: 50%; font-size: 0.9rem; font-weight: 700; line-height: 18px; text-align: center; border: 2px solid #FFF;">+</span>
                    </div>
                    <span class="story-username">Your Story</span>
                </div>
                <input type="file" id="story-file-input" accept="image/*" style="display: none;">
                <!-- Suggestions stories list -->
                <div id="stories-users-list" style="display: flex; gap: 16px;"></div>
            </div>

            <!-- Create Post Card -->
            <div class="create-post-card">
                <form id="create-post-form">
                    <div class="create-post-header">
                        <img id="create-post-avatar" src="/assets/images/default-avatar.svg" class="create-post-avatar" alt="Avatar">
                        <textarea name="caption" class="create-post-textarea" placeholder="Share something visual today..." maxlength="2200" required></textarea>
                    </div>

                    <!-- Post image preview box -->
                    <div class="post-image-preview-container" id="post-image-preview-box">
                        <button type="button" class="remove-preview-btn" id="remove-img-preview-btn">&times;</button>
                        <img src="" id="post-image-img-preview" alt="Post preview">
                    </div>

                    <div class="create-post-footer">
                        <label for="post-image-input" class="upload-post-image-label">📸 Add Photo</label>
                        <input type="file" name="image" id="post-image-input" accept="image/*" style="display: none;" required>
                        <button type="submit" class="btn btn-primary btn-round" style="padding: 6px 16px; font-size: 0.88rem;">Share</button>
                    </div>
                </form>
            </div>

            <!-- Feed Posts Stream -->
            <div class="feed-posts-container" id="feed-posts-wrapper">
                <!-- Loading skeletons -->
                <div class="card skeleton-post-loading">
                    <div style="display: flex; gap: 12px; margin-bottom: 12px; align-items: center;">
                        <div class="skeleton skeleton-avatar"></div>
                        <div class="skeleton skeleton-text skeleton-title"></div>
                    </div>
                    <div class="skeleton skeleton-image"></div>
                </div>
            </div>
            
            <!-- Infinite Scroll Loader -->
            <div id="infinite-scroll-trigger" style="height: 10px;"></div>
        </main>

        <!-- Sidebar Section -->
        <aside class="feed-sidebar">
            <!-- Current User profile card -->
            <div class="sidebar-user-card" id="sidebar-user-card">
                <div style="display: flex; align-items: center;">
                    <img id="sidebar-user-avatar" src="/assets/images/default-avatar.svg" class="sidebar-user-avatar" alt="Avatar">
                    <div class="sidebar-user-info">
                        <div class="sidebar-username" id="sidebar-user-username">username</div>
                        <div class="sidebar-name" id="sidebar-user-name">name</div>
                    </div>
                </div>
                <a href="/login.html" id="sidebar-switch-btn" class="btn-follow-link">Switch</a>
            </div>

            <!-- Suggested Creators Card -->
            <div class="suggestions-card">
                <div class="suggestions-header">
                    <span class="suggestions-title">Suggestions for you</span>
                </div>
                <div class="suggestions-list" id="suggestions-list-wrapper">
                    <!-- Suggested rows loaded via JS -->
                </div>
            </div>
        </aside>
    </div>

    <!-- Stories Viewer Modal -->
    <div id="story-viewer-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 9999; align-items: center; justify-content: center; color: #FFFFFF; font-family: sans-serif;">
        <div style="position: absolute; top: 20px; right: 20px; font-size: 2.5rem; cursor: pointer; color: #FFFFFF; z-index: 10000; line-height: 1;" onclick="closeStoryViewer()">&times;</div>
        
        <!-- Creator Info -->
        <div style="position: absolute; top: 24px; left: 24px; display: flex; gap: 12px; align-items: center; z-index: 10000;">
            <img id="story-viewer-avatar" src="/assets/images/default-avatar.svg" style="width: 36px; height: 36px; border-radius: 50%; border: 2px solid #FFFFFF; object-fit: cover;">
            <span id="story-viewer-username" style="font-weight: 700; font-size: 0.95rem; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">username</span>
        </div>

        <!-- Timer progress indicator -->
        <div style="position: absolute; top: 8px; left: 8px; right: 8px; height: 3px; background: rgba(255,255,255,0.25); border-radius: 2px; overflow: hidden; z-index: 10000;">
            <div id="story-viewer-progress" style="width: 0%; height: 100%; background: #FFFFFF; transition: width 4s linear;"></div>
        </div>

        <!-- Image Frame -->
        <img id="story-viewer-img" src="" style="max-width: 95%; max-height: 85vh; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: contain;">
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/feed.js"></script>
    <script src="/js/follow.js"></script>
</body>
</html>
