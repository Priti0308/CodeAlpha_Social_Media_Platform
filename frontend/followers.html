<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connections Network • CodeAlpha Social</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <style>
        .followers-layout {
            max-width: 600px;
            margin: 32px auto 0;
            padding: 0 20px 80px;
        }
        .followers-header-card {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            padding: 24px;
            text-align: center;
            border-bottom: none;
        }
        .followers-header-title {
            font-size: 1.4rem;
            font-weight: 800;
        }
        .followers-card-list {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            padding: 10px 24px;
            display: flex;
            flex-direction: column;
        }
        .followers-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--gray-100);
        }
        .followers-list-item:last-child {
            border-bottom: none;
        }
        .follower-user-details {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .follower-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }
        .follower-username {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--dark-text);
        }
        .follower-fullname {
            font-size: 0.8rem;
            color: var(--gray-text);
        }
        .btn-follow-action {
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 20px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .btn-follow-action.follow {
            background-color: var(--primary-color);
            color: #FFFFFF;
        }
        .btn-follow-action.unfollow {
            background-color: transparent;
            border-color: var(--border-color);
            color: var(--dark-text);
        }
    </style>
</head>
<body>
    <div class="followers-layout anim-fade-in" style="margin-top: 24px;">
        <!-- Header -->
        <div class="followers-header-card">
            <h1 class="followers-header-title" id="network-title">Network</h1>
            <div class="followers-header-subtitle">
                <span style="color: var(--gray-text); font-size: 0.85rem;">Account of </span>
                <a id="network-profile-link" href="#" style="color: var(--primary-color); font-weight: 600; font-size: 0.9rem;">@username</a>
            </div>
        </div>

        <!-- Connection items list wrapper -->
        <div class="followers-card-list" id="network-users-list">
            <!-- Loading indicator -->
            <div style="text-align: center; padding: 20px;" class="spinner-container">
                <span class="spinner"></span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/follow.js"></script>
</body>
</html>
