<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Details • CodeAlpha Social</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/feed.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <style>
        /* Specific detail layouts */
        .detail-layout {
            max-width: 935px;
            margin: 32px auto 0;
            padding: 0 20px 80px;
            display: flex;
            justify-content: center;
        }
        .detail-card {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-medium);
            display: grid;
            grid-template-columns: 500px 1fr;
            width: 100%;
            height: 600px;
            overflow: hidden;
        }
        .detail-media-side {
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
        }
        .detail-media-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-info-side {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--white);
        }
        .detail-comments-stream {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .comment-item {
            display: flex;
            gap: 12px;
            font-size: 0.88rem;
        }
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .comment-author-name {
            font-weight: 700;
            margin-right: 8px;
        }
        .comment-text {
            line-height: 1.4;
        }
        .comment-meta {
            font-size: 0.72rem;
            color: var(--gray-400);
            margin-top: 4px;
            display: flex;
            gap: 12px;
        }
        .comment-delete-btn {
            color: #EF4444;
            cursor: pointer;
            font-weight: 600;
        }
        .comment-reply-btn {
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 600;
        }
        .replies-container {
            margin-left: 44px;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .reply-item {
            display: flex;
            gap: 12px;
            font-size: 0.82rem;
        }
        .reply-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }
        .reply-author-name {
            font-weight: 700;
            margin-right: 8px;
        }
        .reply-text {
            line-height: 1.4;
        }
        .reply-meta {
            font-size: 0.7rem;
            color: var(--gray-400);
            margin-top: 2px;
            display: flex;
            gap: 12px;
        }
        .reply-delete-btn {
            color: #EF4444;
            cursor: pointer;
            font-weight: 600;
        }
        .reply-input-box {
            display: none;
            margin-left: 44px;
            margin-top: 8px;
            align-items: center;
            gap: 8px;
        }
        .reply-input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 6px 12px;
            font-size: 0.8rem;
            outline: none;
        }
        .reply-submit-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        @media(max-width: 767px) {
            .detail-layout {
                padding: 0 10px 80px;
            }
            .detail-card {
                grid-template-columns: 1fr;
                height: auto;
            }
            .detail-media-side {
                padding-top: 100%;
                position: relative;
            }
            .detail-media-side img {
                position: absolute;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="detail-layout anim-fade-in" style="margin-top: 24px;">
        <div class="detail-card" id="detail-card-wrapper">
            <!-- Left image details pane -->
            <div class="detail-media-side" id="detail-media-pane" ondblclick="triggerDetailDoubleTap()">
                <!-- Loaded dynamically -->
                <div class="like-heart-pop" id="detail-heart-pop">&#x2764;</div>
            </div>

            <!-- Right metadata and comments pane -->
            <div class="detail-info-side">
                <!-- Post Author Header -->
                <div class="post-header" style="border-bottom: 1px solid var(--border-color);">
                    <div class="post-author" id="detail-author-info">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Comments streams -->
                <div class="detail-comments-stream" id="detail-comments-wrapper">
                    <!-- Skeletons comments -->
                </div>

                <!-- Action Panel -->
                <div class="post-actions" style="border-top: 1px solid var(--border-color); padding-bottom: 0;">
                    <div class="post-actions-left">
                        <button class="post-action-btn" id="detail-like-btn" onclick="triggerDetailLike()">🤍</button>
                        <button class="post-action-btn" onclick="document.getElementById('detail-comment-input').focus()">💬</button>
                        <button class="post-action-btn" id="detail-share-btn">🔗</button>
                    </div>
                </div>

                <div class="post-info" style="padding-bottom: 14px;">
                    <div class="post-likes-count">
                        <span id="detail-likes-num">0</span> likes
                    </div>
                </div>

                <!-- Comment Input box -->
                <div class="post-comment-box" style="border-top: 1px solid var(--border-color);">
                    <textarea class="post-comment-input" id="detail-comment-input" placeholder="Add a comment..." rows="1"></textarea>
                    <button class="post-comment-submit-btn" id="detail-comment-submit-btn">Post</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/post.js"></script>
    <script src="/js/comments.js"></script>
</body>
</html>
