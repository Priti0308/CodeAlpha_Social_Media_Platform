<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • CodeAlpha Social</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
    <style>
        /* Instagram UI Custom Layout overrides */
        body {
            background-color: #FAFAFA !important;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
        }

        .ig-login-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 350px;
        }

        /* Forms Column Stack */
        .auth-forms-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .ig-card {
            background-color: #FFFFFF;
            border: 1px solid #DBDBDB;
            padding: 40px 30px 20px 30px;
            display: flex;
            flex-direction: column;
            text-align: center;
            border-radius: 1px;
        }

        .ig-logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 3.2rem;
            color: #262626;
            margin-bottom: 24px;
            text-align: center;
            user-select: none;
        }

        .ig-input-container {
            position: relative;
            width: 100%;
            margin-bottom: 6px;
        }

        .ig-input {
            width: 100%;
            padding: 9px 8px 7px 8px;
            font-size: 0.75rem;
            background-color: #FAFAFA;
            border: 1px solid #DBDBDB;
            border-radius: 3px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .ig-input:focus {
            border-color: #A8A8A8;
        }

        .btn-ig-submit {
            width: 100%;
            background-color: #0095F6;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            padding: 7px;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s, opacity 0.2s;
        }
        .btn-ig-submit:hover:not(:disabled) {
            background-color: #1877F2;
        }
        .btn-ig-submit:disabled {
            background-color: #0095F6;
            opacity: 0.3;
            cursor: default;
        }

        .btn-toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #262626;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0;
        }

        .ig-divider {
            display: flex;
            align-items: center;
            margin: 20px 0 16px 0;
            color: #8E8E8E;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .ig-divider::before, .ig-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #DBDBDB;
        }
        .ig-divider::before { margin-right: 18px; }
        .ig-divider::after { margin-left: 18px; }

        .ig-secondary-link {
            font-size: 0.75rem;
            color: #00376B;
            margin-top: 18px;
            font-weight: 400;
            text-decoration: none;
        }
        .ig-secondary-link:hover {
            text-decoration: underline;
        }

        .ig-prompt-card {
            background-color: #FFFFFF;
            border: 1px solid #DBDBDB;
            padding: 20px;
            text-align: center;
            font-size: 0.88rem;
            border-radius: 1px;
        }
        .ig-prompt-card a {
            color: #0095F6;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="ig-login-layout anim-fade-in">
        <!-- Authentication Columns -->
        <div class="auth-forms-column">
            <!-- Form Card -->
            <div class="ig-card">
                <div class="ig-logo">CodeAlpha Social</div>
                
                <form id="login-form">
                    <div class="ig-input-container">
                        <input type="email" name="email" class="ig-input" placeholder="Email Address" required autofocus>
                    </div>
                    <div class="ig-input-container">
                        <input type="password" name="password" class="ig-input" placeholder="Password" required>
                        <button type="button" class="btn-toggle-password" id="toggle-password" style="display: none;"></button>
                    </div>
                    <button type="submit" class="btn-ig-submit btn-submit" id="btn-login">Log In</button>
                </form>

                <a href="/forgot-password.html" class="ig-secondary-link" style="margin-top: 12px;">Forgot password?</a>
            </div>

            <!-- Toggle Card -->
            <div class="ig-prompt-card">
                Don't have an account? <a href="/register.html">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
