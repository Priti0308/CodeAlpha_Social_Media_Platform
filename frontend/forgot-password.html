<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password • CodeAlpha Social</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
    <style>
        /* Instagram UI Custom Layout overrides */
        body {
            background-color: #FAFAFA !important;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
        }

        .ig-login-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 350px;
        }

        /* Forms Column Stack */
        .auth-forms-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .ig-card {
            background-color: #FFFFFF;
            border: 1px solid #DBDBDB;
            padding: 30px 30px;
            display: flex;
            flex-direction: column;
            text-align: center;
            border-radius: 1px;
        }

        .lock-icon-container {
            width: 96px;
            height: 96px;
            border: 2px solid #262626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto 20px auto;
        }

        .lock-icon {
            font-size: 3rem;
            color: #262626;
        }

        .recovery-title {
            font-size: 1rem;
            font-weight: 600;
            color: #262626;
            margin-bottom: 12px;
        }

        .recovery-desc {
            font-size: 0.85rem;
            color: #8E8E8E;
            line-height: 1.4;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .ig-input-container {
            position: relative;
            width: 100%;
            margin-bottom: 8px;
        }

        .ig-input {
            width: 100%;
            padding: 9px 8px 7px 8px;
            font-size: 0.75rem;
            background-color: #FAFAFA;
            border: 1px solid #DBDBDB;
            border-radius: 3px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .ig-input:focus {
            border-color: #A8A8A8;
        }

        .btn-ig-submit {
            width: 100%;
            background-color: #0095F6;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            padding: 7px;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s, opacity 0.2s;
        }
        .btn-ig-submit:hover:not(:disabled) {
            background-color: #1877F2;
        }
        .btn-ig-submit:disabled {
            background-color: #0095F6;
            opacity: 0.3;
            cursor: default;
        }

        .btn-toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #262626;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0;
        }

        .ig-divider {
            display: flex;
            align-items: center;
            margin: 20px 0 16px 0;
            color: #8E8E8E;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .ig-divider::before, .ig-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #DBDBDB;
        }
        .ig-divider::before { margin-right: 18px; }
        .ig-divider::after { margin-left: 18px; }

        .create-account-link {
            font-size: 0.85rem;
            color: #262626;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .create-account-link:hover {
            color: #8E8E8E;
        }

        .ig-prompt-card {
            background-color: #FAFAFA;
            border: 1px solid #DBDBDB;
            padding: 14px;
            text-align: center;
            font-size: 0.88rem;
            border-radius: 1px;
        }
        .ig-prompt-card a {
            color: #262626;
            font-weight: 600;
            text-decoration: none;
        }
        .ig-prompt-card a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="ig-login-layout anim-fade-in">
        <div class="auth-forms-column">
            <!-- Form Card -->
            <div class="ig-card" id="recovery-card">
                <div class="lock-icon-container">
                    <span class="lock-icon">🔒</span>
                </div>
                
                <div class="recovery-title">Trouble Logging In?</div>
                <div class="recovery-desc" id="recovery-description">
                    Enter your email address and we'll let you reset your password.
                </div>
                
                <!-- Step 1: Verify Email Form -->
                <form id="verify-email-form">
                    <div class="ig-input-container">
                        <input type="email" name="email" id="recovery-email" class="ig-input" placeholder="Email Address" required autofocus>
                    </div>
                    <button type="submit" class="btn-ig-submit btn-submit" id="btn-verify-email">Verify Email</button>
                </form>

                <!-- Step 2: Reset Password Form (Hidden Initially) -->
                <form id="reset-password-form" style="display: none;">
                    <div class="ig-input-container">
                        <input type="password" name="password" id="reset-password-input" class="ig-input" placeholder="New Password" required>
                        <button type="button" class="btn-toggle-password" id="toggle-new-password" style="display: none;"></button>
                    </div>
                    <div class="ig-input-container">
                        <input type="password" name="confirm_password" id="reset-confirm-password-input" class="ig-input" placeholder="Confirm New Password" required>
                        <button type="button" class="btn-toggle-password" id="toggle-confirm-new-password" style="display: none;"></button>
                    </div>
                    <button type="submit" class="btn-ig-submit btn-submit" id="btn-reset-password">Reset Password</button>
                </form>

                <div class="ig-divider">OR</div>
                <a href="/register.html" class="create-account-link">Create New Account</a>
            </div>

            <!-- Back to Login Card -->
            <div class="ig-prompt-card">
                <a href="/login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
